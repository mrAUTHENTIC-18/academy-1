server {
    listen 80;
    server_name ida-academy.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ida-academy.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/ida-academy.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ida-academy.duckdns.org/privkey.pem;

    root /var/www/html;

    location = / {
        return 302 /auth/login.php;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass academy_app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
